function downloadCSV() {
  const rows = [['Nombre','Email','Teléfono','Variante','Fecha','Semana']];
  for (const l of LEADS) {
    const d = new Date(l.ts || Date.now());
    const month = d.getUTCMonth();
    const offset = (month >= 3 && month <= 9) ? -5 : -6;
    const mx = new Date(d.getTime() + offset * 3600000);
    const fecha = mx.toISOString().replace('T',' ').slice(0,19);
    const day = mx.getUTCDay();
    const diff = (day === 0) ? -6 : 1 - day;
    const mon = new Date(mx);
    mon.setUTCDate(mx.getUTCDate() + diff);
    const dd = String(mon.getUTCDate()).padStart(2,'0');
    const mm = String(mon.getUTCMonth()+1).padStart(2,'0');
    const semana = `Semana ${dd}/${mm}/${mon.getUTCFullYear()}`;
    rows.push([l.nombre||'', l.email, l.phone||'', l.variante||'', fecha, semana]);
  }
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'leads_clase_viral.csv';
  a.click();
  document.getElementById('info').textContent = '✓ Descargado. Abre Google Sheets → Archivo → Importar → sube el CSV.';
